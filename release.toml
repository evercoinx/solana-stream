allow-branch               = ["release"]
publish                    = false
verify                     = true
sign-commit                = true
sign-tag                   = true
pre-release-commit-message = "chore: bump project to version {{version}}"
tag-name                   = "v{{version}}"
tag-message                = "Release v{{version}}"
push                       = true
push-remote                = "origin"

pre-release-replacements = [
  { file = "CHANGELOG.md", search = "Unreleased", replace = "{{version}}", min = 1 },
  { file = "CHANGELOG.md", search = "ReleaseDate", replace = "{{date}}", min = 1 },
  { file = "CHANGELOG.md", search = "\\.\\.\\.HEAD", replace = "...{{tag_name}}", exactly = 1 },
  { file = "CHANGELOG.md", search = "<!-- next-header -->", replace = "<!-- next-header -->\n## [Unreleased] - ReleaseDate\n", exactly = 1 },
  { file = "CHANGELOG.md", search = "<!-- next-url -->", replace = "<!-- next-url -->\n[Unreleased]: https://github.com/evercoinx/solana-stream/compare/{{tag_name}}...HEAD", exactly = 1 },
]
