name: Security

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/audit.toml
      - .github/workflows/security.yml
  pull_request:
    branches: [main]
    paths:
      - Cargo.toml
      - Cargo.lock
      - .cargo/audit.toml
      - .github/workflows/security.yml
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/audit@v1.2.7
        name: Audit Rust dependencies
